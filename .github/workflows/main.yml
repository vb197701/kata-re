name: Auto Renew

on:
  schedule:
    - cron: "17 1 2-30/2 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_TOKEN }}
          repository: ${{ secrets.REPO_NAME }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          npm install
          npx playwright install-deps chrome

      - name: Run Renew Script
        env:
          # 将 USERS_JSON 配置在 GitHub Repository Secrets 中
          # 格式: [{"username": "xxx", "password": "xxx"}, ...]
          USERS_JSON: ${{ secrets.USERS_JSON }}
          HTTP_PROXY: ${{ secrets.HTTP_PROXY }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7

      - name: Keepalive
        run: |
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          CONTENT=$(echo "$TIMESTAMP" | base64 -w 0)

          SHA=$(curl -s \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/.keepalive" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('sha',''))" 2>/dev/null || echo "")

          if [ -n "$SHA" ]; then
            BODY="{\"message\":\"chore: keepalive $TIMESTAMP\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}"
          else
            BODY="{\"message\":\"chore: keepalive $TIMESTAMP\",\"content\":\"$CONTENT\"}"
          fi

          curl -s -X PUT \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$BODY" \
            "https://api.github.com/repos/${{ github.repository }}/contents/.keepalive"
