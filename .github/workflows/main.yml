name: Auto Run

on:
  schedule:
    - cron: '11 0 * * *'   # 每天 UTC 00:11 自动检查
  workflow_dispatch:
    inputs:
      run_at:
        description: '2026-05-21T00:18:00Z'
        required: false
        type: string

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-renew
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 拉取公库代码
        uses: actions/checkout@v4

      - name: ⏱️ 时间检查
        id: gate
        shell: bash
        env:
          RUN_AT: ${{ github.event.inputs.run_at }}
        run: |
          set -euo pipefail
          NOW=$(date -u +%s)
          STATE="next_run.txt"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ -n "${RUN_AT:-}" ]; then
              BASE=$(date -u -d "${RUN_AT}" +%s 2>/dev/null || true)
              if [ -z "${BASE:-}" ]; then
                echo "::error::run_at 格式错误，示例：2026-05-17T00:00:00Z"
                exit 1
              fi
              echo "mode=official"   >> "$GITHUB_OUTPUT"
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "✅ [正式模式] 指定时间=$(date -u -d @${BASE} +%Y-%m-%dT%H:%M:%SZ)，执行并记录。"
            else
              echo "mode=test"       >> "$GITHUB_OUTPUT"
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "🧪 [测试模式] 立即执行，不提交记录。"
            fi
            exit 0
          fi

          echo "mode=schedule" >> "$GITHUB_OUTPUT"

          if [ ! -f "$STATE" ]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  next_run.txt 不存在，跳过。请先手动正式执行一次以初始化。"
            exit 0
          fi

          NEXT_ISO=$(cat "$STATE" | tr -d "[:space:]")
          NEXT=$(date -u -d "${NEXT_ISO}" +%s 2>/dev/null || true)

          if [ -z "${NEXT:-}" ]; then
            echo "::error::next_run.txt 内容格式错误: ${NEXT_ISO}"
            exit 1
          fi

          DIFF=$((NOW - NEXT))
          echo "下次运行 : ${NEXT_ISO}"
          echo "当前时间 : $(date -u -d @${NOW} +%Y-%m-%dT%H:%M:%SZ)"

          if [ "$DIFF" -ge 0 ]; then
            echo "should_run=true"  >> "$GITHUB_OUTPUT"
            echo "✅ 时间已到，允许执行。"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "⏳ 未到时间，跳过。还差$(( -DIFF / 3600 ))小时$(( (-DIFF % 3600) / 60 ))分钟。"
          fi

      - name: ℹ️ 判断结果
        shell: bash
        run: |
          echo "should_run = ${{ steps.gate.outputs.should_run }}"
          echo "mode       = ${{ steps.gate.outputs.mode }}"

      - name: 📥 拉取私库脚本
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        if: steps.gate.outputs.should_run == 'true'
        run: |
          mv private/action_renew.js action_renew.js
          mv private/package.json package.json
          [ -f private/package-lock.json ] && mv private/package-lock.json package-lock.json || true
          [ -f private/proxy_handler.py  ] && mv private/proxy_handler.py  proxy_handler.py  || true

      - name: 🟩 安装 Node.js
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: 🐍 安装 Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🌐 启动代理（sing-box）
        if: steps.gate.outputs.should_run == 'true'
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        run: |
          if [ -z "${PROXY_URL:-}" ]; then
            echo "PROXY_URL 未设置，跳过。"
            exit 0
          fi
          echo "::add-mask::$PROXY_URL"
          SINGBOX_VER="1.11.0"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box
          python proxy_handler.py > /dev/null 2>&1
          nohup ./sing-box run -c config.json > singbox.log 2>&1 &
          sleep 5
          EXIT_IP=$(curl -s --max-time 10 -x http://127.0.0.1:8080 https://api.ipify.org 2>/dev/null || echo "")
          if [ -n "$EXIT_IP" ]; then
            echo "::add-mask::$EXIT_IP"
            echo "✅ sing-box 已启动，代理连通性正常。"
          else
            echo "⚠️ sing-box 已启动，但连通性检测超时（可能正常）。"
          fi

      - name: 🛠️ 安装系统依赖 & Chrome
        if: steps.gate.outputs.should_run == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y xvfb
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get install -f -y
          echo "✅ Chrome 版本: $(google-chrome --version)"

      - name: 📦 安装 Node.js 依赖
        if: steps.gate.outputs.should_run == 'true'
        run: npm install

      - name: 🚀 运行续期脚本
        if: steps.gate.outputs.should_run == 'true'
        env:
          USERS_JSON:        ${{ secrets.USERS_JSON }}
          TG_BOT_TOKEN:      ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID:        ${{ secrets.TG_CHAT_ID }}
          PROXY_URL:         ${{ secrets.PROXY_URL }}
          CHROME_PATH:       "/usr/bin/google-chrome"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: ⏰ 提交下次运行时间
        if: steps.gate.outputs.should_run == 'true' && steps.gate.outputs.mode != 'test'
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -f "next_run.txt" ]; then
            echo "::error::action_renew.js 未生成 next_run.txt，请检查脚本是否已添加写入逻辑"
            exit 1
          fi

          NEXT_ISO=$(cat next_run.txt | tr -d "[:space:]")
          echo "下次运行时间: ${NEXT_ISO}"

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add next_run.txt
          if git diff --staged --quiet; then
            echo "next_run.txt 无变化，跳过推送。"
          else
            git commit -m "KeepAlive: next run at ${NEXT_ISO}"
            git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD:main
          fi

      - name: 🧹 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
