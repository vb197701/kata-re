name: Auto Renew

on:
  schedule:
    - cron: '11 0 * * *' # 每天 UTC 00:11 检查一次
  workflow_dispatch:
    inputs:
      first_run_at:
        description: '2026-05-13T00:22:00Z'
        required: false
        type: string
      force_run:
        description: '是否忽略 4 天限制并立即执行'
        required: false
        type: boolean
        default: false

permissions:
  actions: write
  contents: write

concurrency:
  group: auto-renew
  cancel-in-progress: false

jobs:
  renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 拉取公库代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: ⏱️ 判断是否需要执行
        id: gate
        shell: bash
        env:
          FIRST_RUN_AT: ${{ github.event.inputs.first_run_at }}
          FORCE_RUN: ${{ github.event.inputs.force_run }}
        run: |
          set -euo pipefail

          STATE_FILE=".github/state/last_success_run.txt"
          NOW_TS=$(date -u +%s)
          FOUR_DAYS=$((4 * 24 * 60 * 60))

          mkdir -p .github/state
          mkdir -p output

          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "force_run=${FORCE_RUN:-false}"
          echo "first_run_at=${FIRST_RUN_AT:-}"

          # 0) 手动强制执行：直接放行
          if [ "${FORCE_RUN:-false}" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=force_run" >> "$GITHUB_OUTPUT"
            echo "now_ts=$NOW_TS" >> "$GITHUB_OUTPUT"
            echo "手动强制执行，跳过时间检查。"
            exit 0
          fi

          # 1) 如果手动输入了首次执行时间，则优先以它为准
          if [ -n "${FIRST_RUN_AT:-}" ]; then
            FIRST_TS=$(date -u -d "$FIRST_RUN_AT" +%s 2>/dev/null || true)

            if [ -z "${FIRST_TS:-}" ]; then
              echo "first_run_at 格式错误，请使用 UTC ISO 格式，例如 2026-05-16T00:00:00Z"
              exit 1
            fi

            DIFF=$((NOW_TS - FIRST_TS))

            echo "base_ts=$FIRST_TS" >> "$GITHUB_OUTPUT"
            echo "now_ts=$NOW_TS" >> "$GITHUB_OUTPUT"
            echo "diff=$DIFF" >> "$GITHUB_OUTPUT"
            echo "reason=first_run_at" >> "$GITHUB_OUTPUT"

            if [ "$DIFF" -ge 0 ]; then
              echo "should_run=true" >> "$GITHUB_OUTPUT"
              echo "已到首次指定执行时间，允许执行。"
            else
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "未到首次指定执行时间，跳过执行。"
            fi
            exit 0
          fi

          # 2) 如果没有状态文件，则默认允许首次执行
          if [ ! -f "$STATE_FILE" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "reason=no_state_file" >> "$GITHUB_OUTPUT"
            echo "now_ts=$NOW_TS" >> "$GITHUB_OUTPUT"
            echo "未找到状态文件，按首次执行处理。"
            exit 0
          fi

          # 3) 正常按上次成功执行时间 + 4 天判断
          LAST_TS=$(tr -d '\r\n' < "$STATE_FILE")

          if ! [[ "$LAST_TS" =~ ^[0-9]+$ ]]; then
            echo "状态文件格式错误: $LAST_TS"
            exit 1
          fi

          DIFF=$((NOW_TS - LAST_TS))

          echo "base_ts=$LAST_TS" >> "$GITHUB_OUTPUT"
          echo "now_ts=$NOW_TS" >> "$GITHUB_OUTPUT"
          echo "diff=$DIFF" >> "$GITHUB_OUTPUT"
          echo "reason=last_success_plus_4_days" >> "$GITHUB_OUTPUT"

          if [ "$DIFF" -ge "$FOUR_DAYS" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "距离上次成功执行已满 4 天，允许执行。"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "距离上次成功执行未满 4 天，跳过执行。"
          fi

      - name: ℹ️ 输出本次判断结果
        shell: bash
        run: |
          echo "should_run = ${{ steps.gate.outputs.should_run }}"
          echo "reason     = ${{ steps.gate.outputs.reason }}"
          echo "base_ts    = ${{ steps.gate.outputs.base_ts }}"
          echo "now_ts     = ${{ steps.gate.outputs.now_ts }}"
          echo "diff       = ${{ steps.gate.outputs.diff }}"

      - name: 📥 拉取私库脚本
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ secrets.PRIVATE_REPO_NAME }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本到工作目录
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mv private/action_renew.js action_renew.js
          mv private/package.json package.json
          [ -f private/package-lock.json ] && mv private/package-lock.json package-lock.json || true
          [ -f private/proxy_handler.py ] && mv private/proxy_handler.py proxy_handler.py || true

      - name: 🟩 安装 Node.js
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: 🐍 安装 Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 🌐 启动代理（sing-box）
        if: steps.gate.outputs.should_run == 'true'
        env:
          PROXY_URL: ${{ secrets.PROXY_URL }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${PROXY_URL:-}" ]; then
            echo "PROXY_URL 未设置，跳过 sing-box 配置。"
            exit 0
          fi

          echo "::add-mask::$PROXY_URL"

          SINGBOX_VER="1.11.0"
          wget -q "https://github.com/SagerNet/sing-box/releases/download/v${SINGBOX_VER}/sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          tar -xzf "sing-box-${SINGBOX_VER}-linux-amd64.tar.gz"
          mv "sing-box-${SINGBOX_VER}-linux-amd64/sing-box" ./sing-box
          chmod +x ./sing-box

          python proxy_handler.py > /dev/null 2>&1

          nohup ./sing-box run -c config.json > singbox.log 2>&1 &
          sleep 5

          EXIT_IP=$(curl -s --max-time 10 -x http://127.0.0.1:8080 https://api.ipify.org 2>/dev/null || echo "")
          if [ -n "$EXIT_IP" ]; then
            echo "::add-mask::$EXIT_IP"
            echo "✅ sing-box 已启动，代理连通性正常。"
          else
            echo "⚠️ sing-box 已启动，但连通性检测超时（可能正常）。"
          fi

      - name: 🛠️ 安装系统依赖 & Chrome
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y xvfb
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i /tmp/chrome.deb || sudo apt-get install -f -y
          echo "✅ Chrome 版本: $(google-chrome --version)"

      - name: 📦 安装 Node.js 依赖
        if: steps.gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -euo pipefail
          npm install

      - name: 🚀 运行续期脚本
        if: steps.gate.outputs.should_run == 'true'
        env:
          USERS_JSON: ${{ secrets.USERS_JSON }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          CHROME_PATH: "/usr/bin/google-chrome"
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        shell: bash
        run: |
          set -euo pipefail
          xvfb-run --auto-servernum --server-args="-screen 0 1280x720x24" node action_renew.js

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: screenshots/
          retention-days: 7
          if-no-files-found: ignore

      - name: 📝 写入成功执行时间
        if: steps.gate.outputs.should_run == 'true' && success()
        shell: bash
        run: |
          set -euo pipefail

          NOW_TS=$(date -u +%s)
          NOW_ISO=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NEXT_TS=$((NOW_TS + 4 * 24 * 60 * 60))
          NEXT_ISO=$(date -u -d "@${NEXT_TS}" +"%Y-%m-%dT%H:%M:%SZ")

          mkdir -p .github/state
          mkdir -p output

          echo "$NOW_TS" > .github/state/last_success_run.txt

          {
            echo "last_success_unix=$NOW_TS"
            echo "last_success_utc=$NOW_ISO"
            echo "next_eligible_unix=$NEXT_TS"
            echo "next_eligible_utc=$NEXT_ISO"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_number=${GITHUB_RUN_NUMBER}"
            echo "sha=${GITHUB_SHA}"
            echo "gate_reason=${{ steps.gate.outputs.reason }}"
          } > output/last_success_meta.txt

      - name: 📘 更新 README 状态
        if: steps.gate.outputs.should_run == 'true' && success()
        shell: bash
        run: |
          set -euo pipefail

          META_FILE="output/last_success_meta.txt"
          README_FILE="README.md"

          test -f "$META_FILE"
          test -f "$README_FILE"

          LAST_SUCCESS_UNIX=$(grep '^last_success_unix=' "$META_FILE" | cut -d= -f2-)
          LAST_SUCCESS_UTC=$(grep '^last_success_utc=' "$META_FILE" | cut -d= -f2-)
          NEXT_ELIGIBLE_UNIX=$(grep '^next_eligible_unix=' "$META_FILE" | cut -d= -f2-)
          NEXT_ELIGIBLE_UTC=$(grep '^next_eligible_utc=' "$META_FILE" | cut -d= -f2-)
          RUN_ID=$(grep '^run_id=' "$META_FILE" | cut -d= -f2-)
          RUN_NUMBER=$(grep '^run_number=' "$META_FILE" | cut -d= -f2-)
          SHA=$(grep '^sha=' "$META_FILE" | cut -d= -f2-)
          GATE_REASON=$(grep '^gate_reason=' "$META_FILE" | cut -d= -f2-)

          SHORT_SHA="${SHA:0:7}"

          cat > /tmp/readme_status_block.md <<EOF
          <!-- AUTO-RENEW-STATUS:START -->
          - Last success UTC: \`${LAST_SUCCESS_UTC}\`
          - Last success Unix: \`${LAST_SUCCESS_UNIX}\`
          - Next eligible UTC: \`${NEXT_ELIGIBLE_UTC}\`
          - Next eligible Unix: \`${NEXT_ELIGIBLE_UNIX}\`
          - Run ID: [\`${RUN_ID}\`](https://github.com/${GITHUB_REPOSITORY}/actions/runs/${RUN_ID})
          - Run Number: \`${RUN_NUMBER}\`
          - Commit: [\`${SHORT_SHA}\`](https://github.com/${GITHUB_REPOSITORY}/commit/${SHA})
          - Trigger reason: \`${GATE_REASON}\`
          <!-- AUTO-RENEW-STATUS:END -->
          EOF

          python3 - <<'PY'
          from pathlib import Path
          import re

          readme = Path("README.md")
          block = Path("/tmp/readme_status_block.md").read_text(encoding="utf-8").strip()
          content = readme.read_text(encoding="utf-8")

          pattern = re.compile(
              r"<!-- AUTO-RENEW-STATUS:START -->.*?<!-- AUTO-RENEW-STATUS:END -->",
              re.S,
          )

          if not pattern.search(content):
              raise SystemExit("README.md 中没有找到 AUTO-RENEW-STATUS 标记区块")

          content = pattern.sub(block, content)
          readme.write_text(content + "\n", encoding="utf-8")
          PY

      - name: ⏰ 提交状态文件与 README
        if: steps.gate.outputs.should_run == 'true' && success()
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add .github/state/last_success_run.txt output/last_success_meta.txt README.md

          if git diff --staged --quiet; then
            echo "无变化，跳过推送。"
          else
            git commit -m "KeepAlive: update last successful run and README status"
            git push
          fi

      - name: 🧹 清理历史运行记录
        if: always()
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 2
